<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenoTek Hiring Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0f;
    --surface:  #111118;
    --border:   #1e1e2e;
    --border2:  #2a2a3f;
    --accent:   #6c63ff;
    --accent2:  #00d4aa;
    --warn:     #ff6b35;
    --danger:   #ff3b5c;
    --text:     #e8e8f0;
    --muted:    #6b6b8a;
    --mono:     'Space Mono', monospace;
    --sans:     'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── grid noise overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; display: flex; min-height: 100vh; }

  /* ── sidebar ── */
  .sidebar {
    width: 220px;
    min-height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 10;
  }

  .logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
  }
  .logo-mark {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .logo-name {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.1;
  }
  .logo-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .nav { flex: 1; padding: 12px 0; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    border-left: 2px solid transparent;
    user-select: none;
  }
  .nav-item:hover { color: var(--text); background: rgba(108,99,255,0.06); }
  .nav-item.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: rgba(108,99,255,0.1);
  }
  .nav-icon { font-size: 15px; width: 18px; text-align: center; }

  .sidebar-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
  }
  .llm-badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 5px 8px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    color: var(--muted);
    word-break: break-all;
  }
  .llm-badge.active { border-color: var(--accent2); color: var(--accent2); }

  /* ── main content ── */
  .main {
    margin-left: 220px;
    flex: 1;
    padding: 28px 32px;
    min-height: 100vh;
  }

  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .page-title {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }
  .page-title span { color: var(--accent); }

  /* ── stat cards ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }
  @media (max-width: 1100px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .stat-card:hover { border-color: var(--border2); }
  .stat-card::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 60px; height: 60px;
    border-radius: 0 10px 0 60px;
    opacity: 0.08;
  }
  .stat-card.purple::after { background: var(--accent); }
  .stat-card.green::after  { background: var(--accent2); }
  .stat-card.orange::after { background: var(--warn); }
  .stat-card.red::after    { background: var(--danger); }

  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .stat-value { font-family: var(--mono); font-size: 32px; font-weight: 700; line-height: 1; }
  .stat-card.purple .stat-value { color: var(--accent); }
  .stat-card.green  .stat-value { color: var(--accent2); }
  .stat-card.orange .stat-value { color: var(--warn); }
  .stat-card.red    .stat-value { color: var(--danger); }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 6px; }

  /* ── panels ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .panel-title {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text);
  }
  .panel-body { padding: 20px; }

  /* ── buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn-primary:hover { background: #5a52e0; filter: brightness(1.1); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-outline {
    background: transparent;
    color: var(--muted);
    border-color: var(--border2);
  }
  .btn-outline:hover { color: var(--text); border-color: var(--border2); background: rgba(255,255,255,0.04); }
  .btn-danger { background: rgba(255,59,92,0.15); color: var(--danger); border-color: rgba(255,59,92,0.3); }
  .btn-success { background: rgba(0,212,170,0.12); color: var(--accent2); border-color: rgba(0,212,170,0.3); }

  /* ── table ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 11px 14px;
    border-bottom: 1px solid rgba(30,30,46,0.6);
    font-size: 13px;
    vertical-align: middle;
  }
  tr:hover td { background: rgba(108,99,255,0.04); }
  tr:last-child td { border-bottom: none; }

  /* ── tier badges ── */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .badge-fast  { background: rgba(108,99,255,0.2); color: var(--accent); border: 1px solid rgba(108,99,255,0.4); }
  .badge-std   { background: rgba(0,212,170,0.15); color: var(--accent2); border: 1px solid rgba(0,212,170,0.3); }
  .badge-rev   { background: rgba(255,107,53,0.15); color: var(--warn); border: 1px solid rgba(255,107,53,0.3); }
  .badge-rej   { background: rgba(255,59,92,0.12); color: var(--danger); border: 1px solid rgba(255,59,92,0.25); }
  .badge-elim  { background: rgba(255,0,0,0.2); color: #ff6666; border: 1px solid rgba(255,0,0,0.4); }

  /* ── score bar ── */
  .score-bar {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .score-track {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .score-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
  }
  .score-num { font-family: var(--mono); font-size: 12px; min-width: 35px; text-align: right; color: var(--text); }

  /* ── pipeline controls ── */
  .controls-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .control-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .control-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  select, input[type=number], input[type=text] {
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
    padding: 7px 12px;
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  select:focus, input:focus { border-color: var(--accent); }

  /* ── progress bar ── */
  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin: 12px 0;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.5s ease;
  }
  .progress-fill.pulse { animation: pulse 1.2s ease infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* ── log terminal ── */
  .log-terminal {
    background: #050508;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-family: var(--mono);
    font-size: 11px;
    height: 220px;
    overflow-y: auto;
    line-height: 1.7;
    color: #7a7a9a;
  }
  .log-terminal .log-line { animation: fadeIn 0.2s ease; }
  .log-terminal .log-line.green  { color: var(--accent2); }
  .log-terminal .log-line.accent { color: var(--accent); }
  .log-terminal .log-line.warn   { color: var(--warn); }
  .log-terminal .log-line.error  { color: var(--danger); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

  /* ── anti-cheat tester ── */
  .cheat-input {
    width: 100%;
    min-height: 100px;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    padding: 12px;
    font-family: var(--sans);
    font-size: 13px;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }
  .cheat-input:focus { border-color: var(--accent); }

  .result-box {
    padding: 14px 16px;
    border-radius: 8px;
    border: 1px solid;
    margin-top: 14px;
    font-size: 13px;
    animation: fadeIn 0.3s ease;
  }
  .result-box.flagged { background: rgba(255,59,92,0.08); border-color: rgba(255,59,92,0.3); }
  .result-box.ok      { background: rgba(0,212,170,0.06); border-color: rgba(0,212,170,0.25); }
  .result-title { font-family: var(--mono); font-size: 12px; margin-bottom: 8px; }
  .pattern-tag {
    display: inline-block;
    background: rgba(255,59,92,0.15);
    color: var(--danger);
    border: 1px solid rgba(255,59,92,0.3);
    border-radius: 4px;
    padding: 2px 8px;
    font-family: var(--mono);
    font-size: 10px;
    margin: 2px 3px;
  }

  /* ── tier chart ── */
  .tier-chart { display: flex; flex-direction: column; gap: 10px; }
  .tier-row { display: flex; align-items: center; gap: 12px; }
  .tier-label { font-family: var(--mono); font-size: 11px; width: 90px; flex-shrink: 0; }
  .tier-track { flex: 1; height: 22px; background: var(--border); border-radius: 4px; overflow: hidden; position: relative; }
  .tier-fill   { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 8px; font-family: var(--mono); font-size: 10px; font-weight: 700; transition: width 0.6s cubic-bezier(.4,0,.2,1); }
  .tier-count  { font-family: var(--mono); font-size: 11px; color: var(--muted); width: 40px; text-align: right; flex-shrink: 0; }

  /* ── query box ── */
  .query-row { display: flex; gap: 10px; }
  .query-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
    padding: 9px 14px;
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .query-input:focus { border-color: var(--accent); }
  .query-answer {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-size: 13px;
    color: var(--text);
    margin-top: 12px;
    line-height: 1.7;
    white-space: pre-wrap;
    animation: fadeIn 0.3s ease;
  }

  /* ── pagination ── */
  .pagination { display: flex; align-items: center; gap: 8px; justify-content: center; padding: 16px; }
  .page-btn {
    width: 32px; height: 32px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 12px;
    border: 1px solid var(--border2);
    color: var(--muted);
    background: transparent;
    transition: all 0.15s;
  }
  .page-btn:hover { border-color: var(--accent); color: var(--accent); }
  .page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── search ── */
  .search-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  /* ── spinner ── */
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(108,99,255,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── toast ── */
  .toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    animation: slideIn 0.3s ease;
    display: flex; align-items: center; gap: 10px;
    min-width: 260px;
  }
  .toast.success { border-color: rgba(0,212,170,0.4); }
  .toast.error   { border-color: rgba(255,59,92,0.4); }
  @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty-icon  { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }
  .empty-text  { font-size: 13px; }

  .tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .phrase-tag {
    background: rgba(255,107,53,0.1);
    color: var(--warn);
    border: 1px solid rgba(255,107,53,0.25);
    border-radius: 4px;
    padding: 3px 10px;
    font-family: var(--mono);
    font-size: 10px;
  }
  .phrase-count {
    background: rgba(255,107,53,0.2);
    border-radius: 50%;
    width: 16px; height: 16px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 9px;
    margin-left: 4px;
    font-weight: 700;
  }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

  .connection-warn {
    background: rgba(255,107,53,0.08);
    border: 1px solid rgba(255,107,53,0.3);
    border-radius: 8px;
    padding: 14px 18px;
    color: var(--warn);
    font-size: 13px;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script>
const { useState, useEffect, useRef, useCallback } = React;
const API = 'http://localhost:5000/api';

// ── helpers ────────────────────────────────────────────────────
const api = async (path, opts = {}) => {
  const r = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
};

const tierBadge = tier => {
  const map = { 'Fast-Track':'badge badge-fast', 'Standard':'badge badge-std', 'Review':'badge badge-rev', 'Reject':'badge badge-rej' };
  return React.createElement('span', { className: map[tier] || 'badge badge-rej' }, tier || '—');
};

const scoreColor = s => {
  if (s >= 60) return '#6c63ff';
  if (s >= 44) return '#00d4aa';
  if (s >= 25) return '#ff6b35';
  return '#ff3b5c';
};

const ScoreBar = ({ score }) => {
  const pct = Math.min(100, Math.max(0, parseFloat(score) || 0));
  return React.createElement('div', { className: 'score-bar' },
    React.createElement('div', { className: 'score-track' },
      React.createElement('div', { className: 'score-fill', style: { width: pct + '%', background: scoreColor(pct) } })
    ),
    React.createElement('span', { className: 'score-num' }, pct.toFixed(1))
  );
};

const logClass = line => {
  if (/error|fail|traceback/i.test(line)) return 'log-line error';
  if (/✓|done|complete|success|fetched/i.test(line)) return 'log-line green';
  if (/step|component|pipeline/i.test(line)) return 'log-line accent';
  if (/warn|skip/i.test(line)) return 'log-line warn';
  return 'log-line';
};

// ── Toast ──────────────────────────────────────────────────────
const Toast = ({ toasts }) =>
  React.createElement('div', { className: 'toast-wrap' },
    toasts.map(t =>
      React.createElement('div', { key: t.id, className: `toast ${t.type}` },
        React.createElement('span', null, t.type === 'success' ? '✓' : '✕'),
        t.msg
      )
    )
  );

// ── Dashboard ──────────────────────────────────────────────────
const Dashboard = ({ status, loading }) => {
  const { tier_breakdown = {}, top_ai_phrases = [], conversations = {} } = status || {};
  const total = status?.total_candidates || 0;
  const totalInTiers = Object.values(tier_breakdown).reduce((a,b) => a+b, 0);

  const tierRows = [
    { key: 'Fast-Track', color: '#6c63ff' },
    { key: 'Standard',   color: '#00d4aa' },
    { key: 'Review',     color: '#ff6b35' },
    { key: 'Reject',     color: '#ff3b5c' },
  ];

  return React.createElement('div', null,
    React.createElement('div', { className: 'stats-grid' },
      React.createElement('div', { className: 'stat-card purple' },
        React.createElement('div', { className: 'stat-label' }, 'Total Candidates'),
        React.createElement('div', { className: 'stat-value' }, loading ? '…' : total),
        React.createElement('div', { className: 'stat-sub' }, 'in database')
      ),
      React.createElement('div', { className: 'stat-card green' },
        React.createElement('div', { className: 'stat-label' }, 'Fast-Track'),
        React.createElement('div', { className: 'stat-value' }, tier_breakdown['Fast-Track'] || 0),
        React.createElement('div', { className: 'stat-sub' }, 'top candidates')
      ),
      React.createElement('div', { className: 'stat-card orange' },
        React.createElement('div', { className: 'stat-label' }, 'Active Convos'),
        React.createElement('div', { className: 'stat-value' }, conversations.active || 0),
        React.createElement('div', { className: 'stat-sub' }, 'email threads open')
      ),
      React.createElement('div', { className: 'stat-card red' },
        React.createElement('div', { className: 'stat-label' }, 'AI Patterns'),
        React.createElement('div', { className: 'stat-value' }, top_ai_phrases.length),
        React.createElement('div', { className: 'stat-sub' }, 'fingerprints tracked')
      )
    ),

    React.createElement('div', { className: 'two-col' },
      React.createElement('div', { className: 'panel' },
        React.createElement('div', { className: 'panel-header' },
          React.createElement('span', { className: 'panel-title' }, 'Tier Distribution')
        ),
        React.createElement('div', { className: 'panel-body' },
          React.createElement('div', { className: 'tier-chart' },
            tierRows.map(({ key, color }) => {
              const count = tier_breakdown[key] || 0;
              const pct = totalInTiers ? (count / totalInTiers) * 100 : 0;
              return React.createElement('div', { key, className: 'tier-row' },
                React.createElement('span', { className: 'tier-label', style: { color } }, key),
                React.createElement('div', { className: 'tier-track' },
                  React.createElement('div', { className: 'tier-fill', style: { width: pct + '%', background: color + '33', color } },
                    pct > 8 ? count : ''
                  )
                ),

  const esRef  = useRef(null);

  const pollStatus = useCallback(async () => {
    try {
      const s = await api('/pipeline/status');
      setPStatus(s);
      if (!s.running && running) {
        setRunning(false);
        onRefresh();
        addToast(s.step === 'done' ? 'success' : 'error', s.message || 'Pipeline finished');
      }
    } catch {}
  }, [running]);

  useEffect(() => {
    const t = setInterval(pollStatus, 1500);
    return () => clearInterval(t);
  }, [pollStatus]);

  const startSSE = () => {
    if (esRef.current) esRef.current.close();
    const es = new EventSource(API + '/pipeline/logs');
    es.onmessage = e => {
      try {
        const { msg } = JSON.parse(e.data);
        if (msg !== 'ping') setLogs(l => [...l.slice(-200), msg]);
        setTimeout(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, 50);
      } catch {}
    };
    esRef.current = es;

    try {

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
